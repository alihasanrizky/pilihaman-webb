<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilihAman</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-50">

<div class="max-w-md mx-auto p-4">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-4">
        <h1 class="font-bold text-xl">PilihAman</h1>
        <div class="flex gap-2">
            <button id="btnLogout" class="hidden text-red-500 text-sm">Logout</button>
            <button id="btnProHeader" class="bg-amber-400 px-3 py-1 rounded">PRO</button>
        </div>
    </div>

    <!-- INPUT -->
    <textarea id="inputTeks" class="w-full border p-3 rounded h-32"></textarea>

    <!-- KUOTA -->
    <div class="text-sm mt-2">
        Kuota: <span id="kuotaText">10 / 10</span>
    </div>

    <!-- BUTTON -->
    <button id="btnScan" class="w-full bg-blue-600 text-white mt-4 py-3 rounded">
        CEK SEKARANG
    </button>

</div>

<script>
// ============================
// INIT
// ============================
const btnScan = document.getElementById('btnScan');
const inputTeks = document.getElementById('inputTeks');
const kuotaText = document.getElementById('kuotaText');
const btnLogout = document.getElementById('btnLogout');

// ============================
// KUOTA SYSTEM
// ============================
let sisaKuota = parseInt(localStorage.getItem('kuota') || "10");
kuotaText.innerText = `${sisaKuota} / 10`;

// ============================
// FIREBASE
// ============================
const firebaseConfig = {
  apiKey: "AIzaSyDWJMeI-74WX5-pzjXh64No9MCg_8W1PFQ",
  authDomain: "pilihaman-31d79.firebaseapp.com",
  projectId: "pilihaman-31d79",
  storageBucket: "pilihaman-31d79.firebasestorage.app",
  messagingSenderId: "1086896192246",
  appId: "1:1086896192246:web:3759499850410195aa8ad7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// LOGIN STATE
auth.onAuthStateChanged((user) => {
    if (user) {
        btnLogout.classList.remove('hidden');
    } else {
        btnLogout.classList.add('hidden');
    }
});

// LOGOUT
btnLogout.onclick = async () => {
    await auth.signOut();
    location.reload();
};

// ============================
// SCAN LOGIC
// ============================
btnScan.addEventListener('click', async () => {

    const teks = inputTeks.value.trim();

    if (!teks) {
        alert("Isi dulu!");
        return;
    }

    if (sisaKuota <= 0) {
        alert("Kuota habis!");
        return;
    }

    btnScan.innerText = "Loading...";
    btnScan.disabled = true;

    try {
        const res = await fetch('/api/scan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ teks })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        // KUOTA HANYA BERKURANG JIKA SUKSES
        sisaKuota--;
        localStorage.setItem('kuota', sisaKuota);
        kuotaText.innerText = `${sisaKuota} / 10`;

        alert(data.isBahaya ? "BAHAYA!" : "AMAN");

    } catch (err) {
        alert("Error: " + err.message);
    }

    btnScan.innerText = "CEK SEKARANG";
    btnScan.disabled = false;
});
</script>

</body>
</html>
